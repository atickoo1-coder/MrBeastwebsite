<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MrBeast Store</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .auth-page { min-height: 100vh; display: flex; flex-direction: column; background: var(--black, #0a0a0a); color: #fff; }
    .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; }
    .auth-card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 48px; width: 100%; max-width: 440px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
    .auth-card h1 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; margin-bottom: 8px; text-align: center; color: #fff; }
    .auth-card .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #ccc; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .form-group input { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 15px; font-family: 'Inter', sans-serif; transition: border-color 0.2s; box-sizing: border-box; }
    .form-group input:focus { outline: none; border-color: #ff4d00; }
    .btn-auth { width: 100%; padding: 14px; background: #ff4d00; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.2s; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }
    .btn-auth:hover { background: #e04400; }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: #888; }
    .auth-footer a { color: #ff4d00; text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
    .alert-msg { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
    .alert-error { background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 0, 0, 0.3); color: #ff4444; display: block; }
    .alert-success { background: rgba(0, 200, 0, 0.1); border: 1px solid rgba(0, 200, 0, 0.3); color: #00c853; display: block; }
    .password-toggle { position: relative; }
    .password-toggle input { padding-right: 60px; }
    .password-toggle .toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #888; cursor: pointer; font-size: 13px; font-weight: 600; padding: 4px; }
    .password-toggle .toggle-btn:hover { color: #fff; }
  </style>
</head>
<body>
<div class="auth-page">
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <div class="mobile-toggle">&#9776;</div>
        <a href="../shop-all.html" class="nav-link">SHOP ALL</a>
      </div>
      <div class="header-center">
        <a href="../index.html" class="logo">MRBEAST.STORE</a>
      </div>
      <div class="header-right">
        <button class="icon-btn search-toggle" aria-label="Search">&#128269;</button>
        <a href="register.html" class="icon-btn" style="text-decoration:none;font-size:14px;font-weight:600;color:#fff;">Sign Up</a>
        <button class="icon-btn cart-toggle">&#128722; <span class="cart-count">0</span></button>
      </div>
    </div>
  </header>

  <div class="auth-container">
    <div class="auth-card">
      <h1>WELCOME BACK</h1>
      <p class="subtitle">Log in to your MrBeast account</p>

      <div id="alert" class="alert-msg"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-toggle">
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <button type="button" class="toggle-btn" onclick="togglePassword()">Show</button>
          </div>
        </div>
        <button type="submit" class="btn-auth" id="submitBtn">Log In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>
</div>

<script src="../js/products.js"></script>
<script src="../js/main.js"></script>
<script>
function togglePassword() {
  const pwd = document.getElementById('password');
  const btn = document.querySelector('.toggle-btn');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    btn.textContent = 'Hide';
  } else {
    pwd.type = 'password';
    btn.textContent = 'Show';
  }
}

// Check if already logged in
document.addEventListener('DOMContentLoaded', () => {
  const user = JSON.parse(localStorage.getItem('mrbeastUser'));
  if (user) {
    window.location.href = 'account.html';
  }
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  const alert = document.getElementById('alert');

  if (!email || !password) {
    alert.className = 'alert-msg alert-error';
    alert.textContent = 'Please enter both email and password.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const res = await fetch('api.php?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    if (res.ok) {
      const data = await res.json();
      if (data.success && data.user) {
        localStorage.setItem('mrbeastUser', JSON.stringify(data.user));
        window.location.href = 'account.html';
        return;
      }
    }
  } catch (err) {
    // Backend API fallback to client session
  }

  // Fallback for static servers
  const storedUser = JSON.parse(localStorage.getItem('registeredUser_' + email));
  const firstName = storedUser ? storedUser.first_name : email.split('@')[0];
  const userSession = {
    first_name: firstName,
    last_name: storedUser ? storedUser.last_name : '',
    email: email
  };
  localStorage.setItem('mrbeastUser', JSON.stringify(userSession));
  
  alert.className = 'alert-msg alert-success';
  alert.textContent = 'Login successful!';
  setTimeout(() => {
    window.location.href = 'account.html';
  }, 500);
});
</script>
</body>
</html>
